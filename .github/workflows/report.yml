name: Auto Excel Report

on:
  push:
    paths:
      - 'data/*.xlsx'
  workflow_dispatch:
  schedule:
    - cron: '0 17 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install lib
        run: pip install pandas openpyxl

      - name: Run script
        run: python script.py

      - name: Commit report
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add report.xlsx
          git commit -m "update report" || echo "no change"
          git push
